<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recharge Portal</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#007bff;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:400px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
</style>
</head>

<body>

<div class="header">
    <h1>Mobile Recharge Portal</h1>
</div>

<div class="container">

    <label>Operator</label>
    <select id="operator">
        <option>Jio</option>
        <option>Airtel</option>
        <option>Vi</option>
        <option>BSNL</option>
    </select>

    <label>Mobile Number</label>
    <input type="text" id="mobile" placeholder="Enter Mobile Number">

    <label>Recharge Amount</label>
    <input type="number" id="amount" placeholder="Enter Amount">

    <button onclick="recharge()">Recharge Now</button>

</div>

<div class="footer">
    Demo Website for GitHub Pages
</div>

<script>
function recharge(){
    let mobile = document.getElementById("mobile").value;
    let amount = document.getElementById("amount").value;
    let operator = document.getElementById("operator").value;

    if(mobile==="" || amount===""){
        alert("Please fill all fields");
        return;
    }

    alert(
        "Recharge Request Submitted\n\n" +
        "Operator: " + operator +
        "\nMobile: " + mobile +
        "\nAmount: ₹" + amount
    );
}
</script>

</body>
</html>
